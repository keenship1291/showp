version: '3.9'

services:

  # ── Ad Creative Server ────────────────────────────────────────
  app:
    build: .
    container_name: ad-creative-server
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
    volumes:
      - images_data:/app/images   # Persist generated images across restarts
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3

  # ── Redis (job queue + job state) ────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ad-creative-redis
    restart: unless-stopped
    # volatile-lru only evicts keys with a TTL set (our job keys all have TTL),
    # so BullMQ internal keys are never evicted unexpectedly.
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy volatile-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  images_data:   # Generated images — survives container restarts
  redis_data:    # Job queue and state persistence
